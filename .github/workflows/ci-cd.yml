name: MLOps CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-train-api:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download dataset
      run: |
        mkdir -p data
        wget https://raw.githubusercontent.com/selva86/datasets/master/student-mat.csv -O data/student-mat.csv
        
    - name: Run tests
      run: pytest -v

    - name: Train model with MLflow logging
      env:
        MLFLOW_TRACKING_URI: ./mlruns
      run: python src/models/train.py

    - name: Build Docker image
      run: docker build -t student-api:ci .

    - name: Run API container and test endpoints
      run: |
        docker run -d -p 8000:8000 --name student-api-ci student-api:ci
        echo "Waiting for API to start..."
        sleep 20
        echo "Checking /health endpoint with retries..."
        for i in {1..5}; do
          if curl -s http://127.0.0.1:8000/health | grep -q "ok"; then
            echo "Health check passed."
            break
          fi
          echo "Health check failed, retrying in 5 seconds..."
          sleep 5
        done
        echo "Testing /predict endpoint..."
        curl -s -X POST "http://127.0.0.1:8000/predict" \
          -H "Content-Type: application/json" \
          -d '{"age": 17, "Medu": 3, "Fedu": 2, "traveltime": 1, "studytime": 2, "failures": 0, "famrel": 4, "freetime": 3, "goout": 3, "Dalc": 1, "Walc": 2, "health": 4, "absences": 5, "G1": 12, "G2": 13}' \
          | grep -q "predicted_grade"
        docker logs student-api-ci
        docker stop student-api-ci
        docker rm student-api-ci

    - name: Upload MLflow runs as artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlruns
        path: mlruns/